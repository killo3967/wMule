name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        run: |
          & "${{ github.workspace }}\deps\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\deps\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DENABLE_UPNP=ON `
            -DENABLE_NLS=ON `
            -DBUILD_MONOLITHIC=ON `
            -DBUILD_AMULECMD=ON `
            -DBUILD_TESTING=ON

      - name: Build, test and smoke
        run: |
          .\scripts\validate-local.ps1 -RepoRoot "${{ github.workspace }}" -BuildDir "${{ github.workspace }}\build" -Configuration Debug
